name: Deploy Full Clone to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate source
        shell: bash
        run: |
          if [ -f "horeca-costcontrol-full-clone-modified.zip" ]; then
            cp horeca-costcontrol-full-clone-modified.zip source.zip
          else
            echo "Source ZIP was not found."
            exit 1
          fi

      - name: Extract source
        run: unzip -q source.zip -d extracted

      - name: Detect app directory
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find extracted -maxdepth 5 -name package.json | head -n 1)")
          if [ -z "$APP_DIR" ] || [ "$APP_DIR" = "." ]; then
            echo "Could not detect app directory."
            exit 1
          fi
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"
          echo "Detected app directory: $APP_DIR"

      - name: Patch source for GitHub Pages and TanStack Router
        shell: bash
        run: |
          python3 - <<'PY'
          import os, pathlib, re
          app = pathlib.Path(os.environ['APP_DIR'])
          base = '/Cost-Control_Clone'
          rx_base = re.compile(r'(basepath|basename)\s*:\s*([\'\"])/?(HoReCa-CostControl|Cost-Control_Clone)/?\2\s*,?')
          rx_import = re.compile(r'import\s*\{([^}]+)\}\s*from\s*([\'\"])@tanstack/react-router\2')
          rx_create_router = re.compile(r'createRouter\s*\(\s*\{')
          exts = {'.ts','.tsx','.js','.jsx','.mjs','.cjs','.json','.html'}
          skip = {'node_modules','.git','dist','.output'}
          changed = []

          def patch_base(s):
              s = rx_base.sub('', s)
              s = s.replace('/HoReCa-CostControl/', base + '/')
              s = s.replace('/HoReCa-CostControl', base)
              s = s.replace('HoReCa-CostControl/', 'Cost-Control_Clone/')
              return s

          def patch_tanstack_hash_history(s):
              if 'createRouter' not in s or '@tanstack/react-router' not in s:
                  return s
              if 'createHashHistory' not in s:
                  def add_hash_import(m):
                      names = m.group(1).strip()
                      quote = m.group(2)
                      return f'import {{ {names}, createHashHistory }} from {quote}@tanstack/react-router{quote}'
                  s = rx_import.sub(add_hash_import, s, count=1)
              if 'createHashHistory()' in s and 'history:' in s:
                  return s
              s = rx_create_router.sub('createRouter({ history: createHashHistory(),', s, count=1)
              return s

          for p in app.rglob('*'):
              if p.is_dir() or p.suffix.lower() not in exts or any(x in skip for x in p.parts):
                  continue
              try:
                  old = p.read_text()
              except UnicodeDecodeError:
                  continue
              new = patch_tanstack_hash_history(patch_base(old))
              if new != old:
                  p.write_text(new)
                  changed.append(str(p.relative_to(app)))
          print('Patched source files:', changed)
          PY

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: bun install

      - name: Build
        working-directory: ${{ env.APP_DIR }}
        run: bun run build
        env:
          GITHUB_PAGES: 'true'

      - name: Detect build output
        shell: bash
        run: |
          if [ -d "${APP_DIR}/dist" ]; then
            echo "BUILD_DIR=${APP_DIR}/dist" >> "$GITHUB_ENV"
          elif [ -d "${APP_DIR}/.output/public" ]; then
            echo "BUILD_DIR=${APP_DIR}/.output/public" >> "$GITHUB_ENV"
          else
            echo "Build output was not found."
            find "${APP_DIR}" -maxdepth 3 -type d | sort
            exit 1
          fi

      - name: Patch built assets
        shell: bash
        run: |
          python3 - <<'PY'
          import os, pathlib, re
          root = pathlib.Path(os.environ['BUILD_DIR'])
          base = '/Cost-Control_Clone'
          rx = re.compile(r'(basepath|basename)\s*:\s*([\'\"])/?(HoReCa-CostControl|Cost-Control_Clone)/?\2\s*,?')
          exts = {'.js','.mjs','.html','.css','.json','.svg','.map'}
          changed = []
          def patch(s):
              s = rx.sub('', s)
              s = s.replace('/HoReCa-CostControl/', base + '/')
              s = s.replace('/HoReCa-CostControl', base)
              s = s.replace('HoReCa-CostControl/', 'Cost-Control_Clone/')
              return s
          for p in root.rglob('*'):
              if p.is_dir() or p.suffix.lower() not in exts:
                  continue
              try:
                  old = p.read_text()
              except UnicodeDecodeError:
                  continue
              new = patch(old)
              if new != old:
                  p.write_text(new)
                  changed.append(str(p.relative_to(root)))
          print('Patched built files:', changed)
          PY

      - name: Ensure static index with cache busting
        shell: bash
        run: |
          python3 - <<'PY'
          import os, pathlib, re
          root = pathlib.Path(os.environ['BUILD_DIR'])
          base = '/Cost-Control_Clone'
          version = os.environ.get('GITHUB_SHA', '')[:12]
          cache = ('?v=' + version) if version else ''
          index = root / 'index.html'

          def add_cache_to_assets(html):
              html = re.sub(r'(src=[\'\"]' + re.escape(base) + r'/assets/[^\'\"?]+)(?:\?v=[^\'\"]*)?([\'\"])', r'\1' + cache + r'\2', html)
              html = re.sub(r'(href=[\'\"]' + re.escape(base) + r'/assets/[^\'\"?]+)(?:\?v=[^\'\"]*)?([\'\"])', r'\1' + cache + r'\2', html)
              return html

          def normalize(html):
              html = html.replace('/HoReCa-CostControl/', base + '/')
              html = html.replace('/HoReCa-CostControl', base)
              for attr in ('src','href'):
                  html = re.sub(rf'{attr}=([\'\"])(?:\./|/)?assets/', rf'{attr}=\1{base}/assets/', html)
              if 'id="root"' not in html and "id='root'" not in html:
                  html = re.sub(r'(<body[^>]*>)', r'\1\n<div id="root"></div>', html, count=1, flags=re.I)
              return add_cache_to_assets(html)

          if index.exists():
              index.write_text(normalize(index.read_text()))
              print('Preserved and normalized existing index.html with cache busting:', version)
          else:
              assets = root / 'assets'
              js = sorted(assets.glob('index-*.js')) if assets.exists() else []
              if not js and assets.exists():
                  for p in sorted(assets.glob('*.js')):
                      t = p.read_text(errors='ignore')
                      if any(x in t for x in ('createRoot','hydrateRoot','ReactDOM','RouterProvider')):
                          js.append(p)
              if not js and assets.exists():
                  js = sorted(assets.glob('*.js'))
              if not js:
                  raise SystemExit('No JS entry asset found')
              css = sorted(assets.glob('*.css')) if assets.exists() else []
              entry = js[0].relative_to(root).as_posix()
              css_tag = f'<link rel="stylesheet" href="{base}/{css[0].relative_to(root).as_posix()}{cache}" />' if css else ''
              index.write_text(f'''<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cost Control Clone</title>
{css_tag}
</head>
<body>
<div id="root"></div>
<script type="module" src="{base}/{entry}{cache}"></script>
</body>
</html>
''')
              print('Generated fallback index.html with entry:', entry, 'cache:', version)
          (root / '404.html').write_text(index.read_text())
          print('Copied index.html to 404.html')
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
