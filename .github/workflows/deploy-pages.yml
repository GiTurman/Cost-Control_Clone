name: Deploy Full Clone to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate source
        shell: bash
        run: |
          if [ -f "horeca-costcontrol-full-clone-modified.zip" ]; then
            cp horeca-costcontrol-full-clone-modified.zip source.zip
          else
            echo "Source ZIP was not found."
            exit 1
          fi

      - name: Extract source
        run: unzip -q source.zip -d extracted

      - name: Detect app directory
        shell: bash
        run: |
          APP_DIR=$(dirname "$(find extracted -maxdepth 5 -name package.json | head -n 1)")
          echo "APP_DIR=$APP_DIR" >> "$GITHUB_ENV"

      - name: Patch GitHub Pages base path
        shell: bash
        run: |
          if [ -f "${APP_DIR}/vite.config.ts" ]; then
            sed -i 's#/HoReCa-CostControl/#/Cost-Control_Clone/#g' "${APP_DIR}/vite.config.ts"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: bun install

      - name: Build
        working-directory: ${{ env.APP_DIR }}
        run: bun run build
        env:
          GITHUB_PAGES: 'true'

      - name: Detect build output
        shell: bash
        run: |
          if [ -d "${APP_DIR}/dist" ]; then
            echo "BUILD_DIR=${APP_DIR}/dist" >> "$GITHUB_ENV"
          else
            echo "BUILD_DIR=${APP_DIR}/.output/public" >> "$GITHUB_ENV"
          fi

      - name: Ensure static index
        shell: bash
        run: |
          ENTRY=$(find "${BUILD_DIR}/assets" -name "*.js" | head -n 1)
          CSS=$(find "${BUILD_DIR}/assets" -name "*.css" | head -n 1)
          ENTRY_SRC=${ENTRY#${BUILD_DIR}/}
          CSS_SRC=${CSS#${BUILD_DIR}/}
          cat > "${BUILD_DIR}/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1.0" />
          <title>Cost Control Clone</title>
          <link rel="stylesheet" href="/${{ github.event.repository.name }}/${CSS_SRC}" />
          </head>
          <body>
          <div id="root"></div>
          <script type="module" src="/${{ github.event.repository.name }}/${ENTRY_SRC}"></script>
          </body>
          </html>
          EOF
          cp "${BUILD_DIR}/index.html" "${BUILD_DIR}/404.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
